<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CardScan</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04080f;color:#e2e8f0;font-family:'Share Tech Mono',monospace;min-height:100vh}
.header{border-bottom:1px solid #0f172a;background:linear-gradient(180deg,#070d1a 0%,#04080f 100%);padding:18px 16px}
.logo{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#e2e8f0;letter-spacing:4px}
.logo span{color:#f59e0b}
.subtitle{font-size:10px;color:#334155;letter-spacing:3px;margin-top:2px}
.content{max-width:700px;margin:0 auto;padding:20px 16px 80px}
.auth-panel{background:linear-gradient(135deg,#070d1a 0%,#0a1020 100%);border:1px solid #1e293b;border-radius:14px;padding:24px}
.auth-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#f59e0b;margin-bottom:6px;letter-spacing:2px}
.auth-sub{font-size:12px;color:#475569;margin-bottom:20px;line-height:1.6}
.field{margin-bottom:12px}
.field-label{font-size:10px;color:#475569;letter-spacing:2px;margin-bottom:6px}
input{background:#070d1a;border:1px solid #1e293b;border-radius:8px;color:#e2e8f0;font-family:'Share Tech Mono',monospace;font-size:13px;padding:11px 14px;width:100%;outline:none}
.error-box{background:#1c0a0a;border:1px solid #f8717133;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#f87171;display:none}
.btn{width:100%;border:none;border-radius:10px;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:3px;padding:14px;cursor:pointer}
.btn-orange{background:linear-gradient(135deg,#b45309 0%,#f59e0b 100%);color:#000;font-size:15px}
.btn-scan{background:linear-gradient(135deg,#b45309 0%,#f59e0b 100%);color:#000;font-size:18px;border-radius:12px;margin-bottom:12px;box-shadow:0 0 30px #f59e0b33}
.btn:disabled{background:#1e293b;color:#475569;cursor:not-allowed;box-shadow:none}
.trending-bar{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.trend-pill{background:#1e293b;border:1px solid #334155;border-radius:20px;color:#94a3b8;font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px 10px;white-space:nowrap}
.trend-pill.anchor{border-color:#f59e0b44;color:#f59e0b;background:#f59e0b11}
.grade-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.grade-tab{background:#070d1a;border:1px solid #1e293b;border-radius:10px;color:#475569;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;padding:8px 14px;cursor:pointer;white-space:nowrap}
.listing-card{background:linear-gradient(135deg,#0a0f1e,#0f172a);border:1px solid #1e293b;border-radius:12px;padding:14px;margin-bottom:10px}
.listing-card.is-deal{border-color:#f59e0b88;background:linear-gradient(135deg,#100e00,#131200)}
.card-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.listing-img{width:60px;height:82px;object-fit:contain;border-radius:6px;flex-shrink:0;background:#1e293b}
.card-info{flex:1;min-width:0}
.tags{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.tag{border-radius:4px;padding:2px 7px;font-size:9px;letter-spacing:1px;font-weight:700}
.deal{background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44}
.fair{background:#38bdf822;color:#38bdf8;border:1px solid #38bdf844}
.pass{background:#f8717122;color:#f87171;border:1px solid #f8717144}
.auction-tag{background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa44}
.ending{background:#ef444422;color:#ef4444;border:1px solid #ef444444}
.ending.urgent{background:#ef4444;color:#fff;animation:pulse 1s infinite}
.card-title{font-size:12px;color:#cbd5e1;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.metrics-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.metric{background:#070d1a;border:1px solid #1e293b;border-radius:8px;padding:8px;text-align:center}
.metric-label{font-size:8px;color:#475569;letter-spacing:1px;margin-bottom:3px}
.metric-value{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:#e2e8f0}
.metric-value.green{color:#4ade80}
.metric-value.red{color:#f87171}
.metric-value.gold{color:#f59e0b}
.ai-text{font-size:11px;color:#94a3b8;margin-bottom:10px;line-height:1.5;background:#ffffff06;border-radius:6px;padding:8px}
.bid-btn{display:block;width:100%;background:linear-gradient(135deg,#b45309,#f59e0b);color:#000;border:none;border-radius:8px;padding:10px;font-size:13px;font-family:'Orbitron',monospace;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;letter-spacing:2px}
.bid-btn.urgent{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;animation:pulse 0.8s infinite}
.empty{text-align:center;padding:60px 20px;color:#1e293b;font-size:13px}
.empty span{color:#334155}
.loading{text-align:center;padding:30px;color:#334155;font-size:12px;line-height:2}
.err{padding:16px;background:#1c0a0a;border:1px solid #f8717133;border-radius:8px;font-size:12px;color:#f87171}
.deal-badge{background:#f59e0b22;border:1px solid #f59e0b44;border-radius:8px;padding:6px 12px;font-family:'Orbitron',monospace;font-size:14px;color:#f59e0b;font-weight:700;display:none}
.logout{background:#1e293b;color:#64748b;border:1px solid #334155;border-radius:6px;padding:4px 10px;font-size:10px;font-family:'Share Tech Mono',monospace;cursor:pointer;letter-spacing:1px}
.section-label{font-size:9px;color:#334155;letter-spacing:2px;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.spin{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>
<body>
<div class="header">
<div style="max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
<div>
<div class="logo">CARD<span>SCAN</span></div>
<div class="subtitle">AUCTION SNIPER · ENDING SOON</div>
</div>
<div style="display:flex;align-items:center;gap:12px">
<div id="dealBadge" class="deal-badge">🔥 <span id="dealCount">0</span> DEALS</div>
<div id="lastScan" style="font-size:10px;color:#334155"></div>
<button class="logout" id="logoutBtn" style="display:none" onclick="logout()">DISCONNECT</button>
</div>
</div>
</div>
<div class="content">
<div id="authPanel" class="auth-panel">
<div class="auth-title">CONNECT EBAY</div>
<div class="auth-sub">Paste your Production keys from developer.ebay.com</div>
<div class="field"><div class="field-label">CLIENT ID</div><input type="text" id="clientId" placeholder="BrianPel-Cardtrac-PRD-..."/></div>
<div class="field" style="margin-bottom:18px"><div class="field-label">CLIENT SECRET</div><input type="password" id="clientSecret" placeholder="PRD-..."/></div>
<div id="authError" class="error-box"></div>
<button class="btn btn-orange" id="connectBtn" onclick="handleAuth()">CONNECT & SCAN</button>
</div>
<div id="scannerPanel" style="display:none">
<button class="btn btn-scan" id="scanBtn" onclick="runFullScan()">⚡ RUN FULL SCAN</button>
<div class="section-label">SCANNING TARGETS</div>
<div class="trending-bar" id="trendingBar"><span class="trend-pill">Loading players...</span></div>
<div class="grade-tabs" id="gradeTabs"></div>
<div id="listingsArea"><div class="empty">Hit RUN FULL SCAN<br/><span>Auctions ending in 2 hours · sorted soonest</span></div></div>
</div>
</div>
<script>
var PROXY='https://card-scanner-proxy.onrender.com';
var ANCHORS=['Mahomes','Tom Brady','LeBron James','Stephen Curry'];
var GRADES=[
{id:'psa10',label:'PSA 10',grade:'PSA 10',color:'#f59e0b'},
{id:'psa9',label:'PSA 9',grade:'PSA 9',color:'#38bdf8'},
{id:'bgs95',label:'BGS 9.5',grade:'BGS 9.5',color:'#a78bfa'},
{id:'bgs10',label:'BGS 10',grade:'BGS 10',color:'#4ade80'}
];

// Hardcoded market values — [low, high] per grade
var MARKET_VALUES = {
  'psa10': [
    {keywords:['mahomes','donruss','2017'],low:800,high:1100},
    {keywords:['mahomes','prizm','2017'],low:2500,high:3500},
    {keywords:['mahomes','contenders','2017'],low:600,high:900},
    {keywords:['mahomes','topps','2017'],low:300,high:500},
    {keywords:['brady','bowman','2000'],low:10000,high:15000},
    {keywords:['brady','topps','2000'],low:800,high:1200},
    {keywords:['brady','playoff','contenders','2000'],low:3000,high:5000},
    {keywords:['lebron','topps','2003'],low:3500,high:5000},
    {keywords:['lebron','chrome','2003'],low:8000,high:12000},
    {keywords:['lebron','exquisite','2003'],low:50000,high:80000},
    {keywords:['curry','topps','2009'],low:400,high:600},
    {keywords:['curry','prizm','2012'],low:800,high:1200},
    {keywords:['curry','chrome','2009'],low:1500,high:2500},
    {keywords:['burrow','prizm','2020'],low:200,high:350},
    {keywords:['burrow','donruss','2020'],low:100,high:180},
    {keywords:['herbert','prizm','2020'],low:150,high:250},
    {keywords:['wembanyama','prizm','2023'],low:300,high:500},
    {keywords:['wembanyama','topps','2023'],low:150,high:280},
    {keywords:['luka','prizm','2018'],low:500,high:800},
    {keywords:['judge','topps','2017'],low:200,high:350},
    {keywords:['shohei','topps','2018'],low:300,high:500},
    {keywords:['jeanty','donruss','2025'],low:30,high:60},
    {keywords:['jeanty','prizm','2025'],low:50,high:100},
    {keywords:['flagg','2025'],low:100,high:200}
  ],
  'psa9': [
    {keywords:['mahomes','donruss','2017'],low:300,high:500},
    {keywords:['mahomes','prizm','2017'],low:800,high:1200},
    {keywords:['brady','bowman','2000'],low:3000,high:5000},
    {keywords:['lebron','topps','2003'],low:1000,high:1800},
    {keywords:['curry','topps','2009'],low:150,high:250},
    {keywords:['burrow','prizm','2020'],low:80,high:140},
    {keywords:['wembanyama','prizm','2023'],low:100,high:180},
    {keywords:['luka','prizm','2018'],low:180,high:300}
  ],
  'bgs95': [
    {keywords:['mahomes','donruss','2017'],low:500,high:750},
    {keywords:['mahomes','prizm','2017'],low:1500,high:2200},
    {keywords:['brady','bowman','2000'],low:6000,high:9000},
    {keywords:['lebron','topps','2003'],low:2000,high:3500},
    {keywords:['curry','topps','2009'],low:250,high:400},
    {keywords:['burrow','prizm','2020'],low:120,high:200},
    {keywords:['wembanyama','prizm','2023'],low:180,high:300}
  ],
  'bgs10': [
    {keywords:['mahomes','donruss','2017'],low:2000,high:3500},
    {keywords:['mahomes','prizm','2017'],low:6000,high:10000},
    {keywords:['brady','bowman','2000'],low:25000,high:40000},
    {keywords:['lebron','topps','2003'],low:10000,high:18000},
    {keywords:['curry','topps','2009'],low:1000,high:1800},
    {keywords:['burrow','prizm','2020'],low:400,high:700}
  ]
};

function getMarketValue(title, gradeId) {
  var t = title.toLowerCase();
  var values = MARKET_VALUES[gradeId] || MARKET_VALUES['psa10'];
  for (var i = 0; i < values.length; i++) {
    var entry = values[i];
    var allMatch = entry.keywords.every(function(kw) { return t.indexOf(kw) >= 0; });
    if (allMatch) return {low: entry.low, high: entry.high, mid: (entry.low + entry.high) / 2};
  }
  return null;
}

var clientId='',clientSecret='',activeGrade='psa10',scanData={},scanning=false,trendingPlayers=[];

function init(){
var sid=localStorage.getItem('ebay_client_id');
var ssec=localStorage.getItem('ebay_client_secret');
if(sid&&ssec){clientId=sid;clientSecret=ssec;showScanner();}
}

function handleAuth(){
var id=document.getElementById('clientId').value.trim();
var sec=document.getElementById('clientSecret').value.trim();
if(!id||!sec){document.getElementById('authError').textContent='Enter both fields';document.getElementById('authError').style.display='block';return;}
clientId=id;clientSecret=sec;
localStorage.setItem('ebay_client_id',id);
localStorage.setItem('ebay_client_secret',sec);
showScanner();
}

function showScanner(){
document.getElementById('authPanel').style.display='none';
document.getElementById('scannerPanel').style.display='block';
document.getElementById('logoutBtn').style.display='block';
buildTabs();
loadTrending();
}

function logout(){
localStorage.removeItem('ebay_client_id');
localStorage.removeItem('ebay_client_secret');
clientId='';clientSecret='';
document.getElementById('authPanel').style.display='block';
document.getElementById('scannerPanel').style.display='none';
document.getElementById('logoutBtn').style.display='none';
}

function loadTrending(){
fetch(PROXY+'/trending?clientId='+encodeURIComponent(clientId)+'&clientSecret='+encodeURIComponent(clientSecret))
.then(function(r){return r.json();})
.then(function(d){if(d.players){trendingPlayers=d.players;renderTrending(d.players);}})
.catch(function(){trendingPlayers=ANCHORS;renderTrending(ANCHORS);});
}

function renderTrending(players){
var bar=document.getElementById('trendingBar');
bar.innerHTML=players.map(function(p){
var isAnchor=ANCHORS.indexOf(p)>=0;
return '<span class="trend-pill'+(isAnchor?' anchor':'')+'">'+(isAnchor?'⭐ ':'')+p+'</span>';
}).join('');
}

function buildTabs(){
var t=document.getElementById('gradeTabs');t.innerHTML='';
GRADES.forEach(function(tg){
var b=document.createElement('button');
b.className='grade-tab';b.id='tab-'+tg.id;
b.onclick=function(){activeGrade=tg.id;updateTabs();renderListings();};
t.appendChild(b);
});
updateTabs();
}

function updateTabs(){
GRADES.forEach(function(tg){
var b=document.getElementById('tab-'+tg.id);if(!b)return;
var d=scanData[tg.id]||{};
var deals=Object.values(d.ratings||{}).filter(function(r){return r.tag==='DEAL';}).length;
var active=activeGrade===tg.id;
b.style.background=active?tg.color+'22':'#070d1a';
b.style.borderColor=active?tg.color:'#1e293b';
b.style.color=active?tg.color:'#475569';
b.innerHTML=tg.label+(deals>0?'<span style="margin-left:6px;background:#f59e0b;color:#000;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:900">'+deals+'</span>':'')+(d.loading?'<span class="spin" style="margin-left:6px">⟳</span>':'');
});
var total=Object.values(scanData).reduce(function(s,d){return s+Object.values(d.ratings||{}).filter(function(r){return r.tag==='DEAL';}).length;},0);
document.getElementById('dealCount').textContent=total;
document.getElementById('dealBadge').style.display=total>0?'block':'none';
}

function getCurrentBid(item){
var p=item.currentBidPrice||item.price;
if(!p||!p.value)return null;
var v=parseFloat(p.value);
return v>0?v:null;
}

function formatPrice(val){
if(!val&&val!==0)return'—';
return'$'+parseFloat(val).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function formatEndTime(item){
if(!item.itemEndDate)return null;
var ms=new Date(item.itemEndDate)-Date.now();
if(ms<0)return'ended';
var mins=Math.round(ms/60000);
if(mins<1)return'<1m';
if(mins<60)return mins+'m';
var h=Math.floor(mins/60),m=mins%60;
return h+'h'+(m>0?' '+m+'m':'');
}

function rateCard(item, gradeId) {
  var mv = getMarketValue(item.title || '', gradeId);
  var bid = getCurrentBid(item);
  if (!mv) return {tag:'UNKNOWN', marketStr:'—', pctStr:'—', pctClass:'', text:'No comp data — verify manually'};
  var marketStr = formatPrice(mv.low) + ' – ' + formatPrice(mv.high);
  if (!bid) return {tag:'WATCH', marketStr:marketStr, pctStr:'No bids', pctClass:'', text:'No current bids — watch for snipe opportunity'};
  var pct = Math.round(((bid - mv.mid) / mv.mid) * 100);
  var tag, pctStr, pctClass, text;
  if (pct <= -20) {
    tag='DEAL'; pctStr=pct+'%'; pctClass='green';
    text='🔥 Significantly underpriced vs market. Strong buy.';
  } else if (pct <= -5) {
    tag='DEAL'; pctStr=pct+'%'; pctClass='green';
    text='Below market value. Worth bidding.';
  } else if (pct <= 5) {
    tag='FAIR'; pctStr='AT MKT'; pctClass='';
    text='Priced at market. Bid only if you need it.';
  } else if (pct <= 20) {
    tag='PASS'; pctStr='+'+pct+'%'; pctClass='red';
    text='Slightly above market. Better deals likely available.';
  } else {
    tag='PASS'; pctStr='+'+pct+'%'; pctClass='red';
    text='Overpriced. Skip this one.';
  }
  return {tag:tag, marketStr:marketStr, pctStr:pctStr, pctClass:pctClass, text:text};
}

function renderListings(){
var area=document.getElementById('listingsArea');
var d=scanData[activeGrade]||{};
var tg=GRADES.find(function(t){return t.id===activeGrade;});
if(!d.listings&&!d.loading){area.innerHTML='<div class="empty">Hit RUN FULL SCAN<br/><span>Auctions ending in 2 hours · sorted soonest</span></div>';return;}
if(d.loading){area.innerHTML='<div class="loading"><span class="spin">⟳</span><br/>'+(d.status||'Scanning...')+'</div>';return;}
if(d.error){area.innerHTML='<div class="err">'+d.error+'</div>';return;}
if(!d.listings||!d.listings.length){area.innerHTML='<div class="empty"><span>No auctions ending soon.<br/>Try again in a few minutes.</span></div>';return;}
area.innerHTML=d.listings.map(function(item){
var rating=rateCard(item, activeGrade);
var currentBid=getCurrentBid(item);
var timeLeft=formatEndTime(item);
var img=item.image?item.image.imageUrl:'';
var urgentMins=timeLeft&&timeLeft.indexOf('m')===timeLeft.length-1&&parseInt(timeLeft)<=30;
var isDeal=rating.tag==='DEAL';
var tagClass=rating.tag==='DEAL'?'deal':rating.tag==='PASS'?'pass':rating.tag==='FAIR'?'fair':'';
var tagLabel=rating.tag==='DEAL'?'🔥 DEAL':rating.tag==='PASS'?'⚠️ PASS':rating.tag==='FAIR'?'✅ FAIR':'';
return '<div class="listing-card'+(isDeal?' is-deal':'')+'">'
+'<div class="card-top">'
+(img?'<img class="listing-img" src="'+img+'" alt=""/>':'')
+'<div class="card-info">'
+'<div class="tags">'
+(tagLabel?'<span class="tag '+tagClass+'">'+tagLabel+'</span>':'')
+'<span class="tag auction-tag">AUCTION</span>'
+(timeLeft?'<span class="tag ending'+(urgentMins?' urgent':'')+'">⏱ '+timeLeft+'</span>':'')
+'</div>'
+'<div class="card-title">'+(item.title||'')+'</div>'
+'</div></div>'
+'<div class="metrics-row">'
+'<div class="metric"><div class="metric-label">CURRENT BID</div><div class="metric-value gold">'+(currentBid?formatPrice(currentBid):'No bids')+'</div></div>'
+'<div class="metric"><div class="metric-label">MARKET VALUE</div><div class="metric-value" style="font-size:10px;line-height:1.4">'+rating.marketStr+'</div></div>'
+'<div class="metric"><div class="metric-label">VS MARKET</div><div class="metric-value '+rating.pctClass+'" style="font-size:15px">'+rating.pctStr+'</div></div>'
+'</div>'
+'<div class="ai-text">'+rating.text+'</div>'
+'<a class="bid-btn'+(urgentMins?' urgent':'')+'" href="'+(item.itemWebUrl||'#')+'" target="_blank">'+(urgentMins?'⚡ BID NOW — ENDING SOON':'BID ON EBAY →')+'</a>'
+'</div>';
}).join('');
}

function fetchWithRetry(url,retries,delay){
retries=retries||3;delay=delay||4000;
return new Promise(function(resolve,reject){
function attempt(n){
var controller=new AbortController();
var t=setTimeout(function(){controller.abort();},55000);
fetch(url,{signal:controller.signal})
.then(function(r){clearTimeout(t);return r.json();})
.then(resolve)
.catch(function(e){clearTimeout(t);if(n<=1)reject(e);else setTimeout(function(){attempt(n-1);},delay);});
}
attempt(retries);
});
}

function runFullScan(){
if(!clientId||!clientSecret||scanning)return;
scanning=true;
var btn=document.getElementById('scanBtn');
btn.disabled=true;btn.textContent='⟳ SCANNING...';
document.getElementById('lastScan').textContent='Last: '+new Date().toLocaleTimeString();
var players=trendingPlayers.length>0?trendingPlayers:ANCHORS;
var gi=0;
function nextGrade(){
if(gi>=GRADES.length){scanning=false;btn.disabled=false;btn.textContent='⚡ RUN FULL SCAN';return;}
var tg=GRADES[gi];gi++;
scanData[tg.id]={loading:true,listings:[],ratings:{},aiLoading:false,error:null,status:'Searching for '+tg.grade+' auctions...'};
updateTabs();if(activeGrade===tg.id)renderListings();
var all=[],done=0;
players.forEach(function(player){
var q=player+' rookie -reprint -lot -custom';
var url=PROXY+'/scan?clientId='+encodeURIComponent(clientId)+'&clientSecret='+encodeURIComponent(clientSecret)+'&q='+encodeURIComponent(q)+'&grade='+encodeURIComponent(tg.grade);
fetchWithRetry(url,2,3000).then(function(data){
(data.itemSummaries||[]).forEach(function(it){all.push(it);});
}).catch(function(){}).finally(function(){
done++;
if(done<players.length)return;
var seen={};
var unique=all.filter(function(it){if(seen[it.itemId])return false;seen[it.itemId]=true;return true;});
unique.sort(function(a,b){
var ta=a.itemEndDate?new Date(a.itemEndDate).getTime():9999999999999;
var tb=b.itemEndDate?new Date(b.itemEndDate).getTime():9999999999999;
return ta-tb;
});
var listings=unique.slice(0,20);
scanData[tg.id]={loading:false,listings:listings,ratings:{},aiLoading:false,error:null};
updateTabs();if(activeGrade===tg.id)renderListings();
nextGrade();
});
});
}
nextGrade();
}
