.empty{text-align:center;padding:60px 20px;color:#1e293b;font-size:13px}

.section-label{font-size:9px;color:#334155;letter-spacing:2px;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>

function handleAuth(){
var id=document.getElementById('clientId').value.trim();

localStorage.setItem('ebay_client_id',id);
localStorage.setItem('ebay_client_secret',sec);
showScanner();
}

function showScanner(){
document.getElementById('authPanel').style.display='none';

loadTrending();
}

function logout(){
localStorage.removeItem('ebay_client_id');
