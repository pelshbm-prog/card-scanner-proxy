<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CardScan</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04080f;color:#e2e8f0;font-family:'Share Tech Mono',monospace;min-height:100vh}
.header{border-bottom:1px solid #0f172a;background:linear-gradient(180deg,#070d1a 0%,#04080f 100%);padding:18px 16px}
.logo{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#e2e8f0;letter-spacing:4px}
.logo span{color:#f59e0b}
.subtitle{font-size:10px;color:#334155;letter-spacing:3px;margin-top:2px}
.content{max-width:700px;margin:0 auto;padding:20px 16px 80px}
.auth-panel{background:linear-gradient(135deg,#070d1a 0%,#0a1020 100%);border:1px solid #1e293b;border-radius:14px;padding:24px}
.auth-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#f59e0b;margin-bottom:6px;letter-spacing:2px}
.auth-sub{font-size:12px;color:#475569;margin-bottom:20px;line-height:1.6}
.field{margin-bottom:12px}
.field-label{font-size:10px;color:#475569;letter-spacing:2px;margin-bottom:6px}
input{background:#070d1a;border:1px solid #1e293b;border-radius:8px;color:#e2e8f0;font-family:'Share Tech Mono',monospace;font-size:13px;padding:11px 14px;width:100%;outline:none}
.error-box{background:#1c0a0a;border:1px solid #f8717133;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#f87171;display:none}
.btn{width:100%;border:none;border-radius:10px;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:3px;padding:14px;cursor:pointer}
.btn-orange{background:linear-gradient(135deg,#b45309 0%,#f59e0b 100%);color:#000;font-size:15px}
.btn-scan{background:linear-gradient(135deg,#b45309 0%,#f59e0b 100%);color:#000;font-size:18px;border-radius:12px;margin-bottom:20px;box-shadow:0 0 30px #f59e0b33}
.btn:disabled{background:#1e293b;color:#475569;cursor:not-allowed;box-shadow:none}
.grade-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.grade-tab{background:#070d1a;border:1px solid #1e293b;border-radius:10px;color:#475569;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;padding:8px 14px;cursor:pointer;white-space:nowrap}
.listing-card{background:linear-gradient(135deg,#0a0f1e,#0f172a);border:1px solid #1e293b;border-radius:10px;padding:12px;display:flex;gap:12px;margin-bottom:8px}
.listing-img{width:54px;height:74px;object-fit:contain;border-radius:4px;flex-shrink:0;background:#1e293b}
.listing-body{flex:1;min-width:0}
.tags{display:flex;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.tag{border-radius:4px;padding:2px 8px;font-size:10px;letter-spacing:1px;font-weight:700}
.deal{background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44}
.fair{background:#38bdf822;color:#38bdf8;border:1px solid #38bdf844}
.pass{background:#f8717122;color:#f87171;border:1px solid #f8717144}
.auction{background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa44;font-size:9px}
.buynow{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;font-size:9px}
.title{font-size:12px;color:#cbd5e1;line-height:1.4;margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.ai-text{font-size:10px;color:#64748b;margin-bottom:6px;line-height:1.4}
.footer{display:flex;justify-content:space-between;align-items:center}
.price{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#f59e0b}
.view-link{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:6px;padding:4px 10px;font-size:10px;text-decoration:none;letter-spacing:1px}
.empty{text-align:center;padding:60px 20px;color:#1e293b;font-size:13px}
.empty span{color:#334155}
.loading{text-align:center;padding:30px;color:#334155;font-size:12px;line-height:2}
.ai-loading{background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:11px;color:#64748b}
.err{padding:16px;background:#1c0a0a;border:1px solid #f8717133;border-radius:8px;font-size:12px;color:#f87171}
.deal-badge{background:#f59e0b22;border:1px solid #f59e0b44;border-radius:8px;padding:6px 12px;font-family:'Orbitron',monospace;font-size:14px;color:#f59e0b;font-weight:700;display:none}
.logout{background:#1e293b;color:#64748b;border:1px solid #334155;border-radius:6px;padding:4px 10px;font-size:10px;font-family:'Share Tech Mono',monospace;cursor:pointer;letter-spacing:1px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>
<body>
<div class="header">
  <div style="max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <div>
      <div class="logo">CARD<span>SCAN</span></div>
      <div class="subtitle">EBAY GRADED ROOKIE SCANNER</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div id="dealBadge" class="deal-badge">🔥 <span id="dealCount">0</span> DEALS</div>
      <div id="lastScan" style="font-size:10px;color:#334155"></div>
      <button class="logout" id="logoutBtn" style="display:none" onclick="logout()">DISCONNECT</button>
    </div>
  </div>
</div>
<div class="content">
  <div id="authPanel" class="auth-panel">
    <div class="auth-title">CONNECT EBAY</div>
    <div class="auth-sub">Paste your Production keys​​​​​​​​​​​​​​​​
