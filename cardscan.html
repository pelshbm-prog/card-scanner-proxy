input{background:#070d1a;border:1px solid #1e293b;border-radius:8px;color:#e2e8f0;font-family:'Share Tech Mono',monospace;font-size:13px;padding:11px 14px;width:100%;outline:none}
.error-box{background:#1c0a0a;border:1px solid #f8717133;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#f87171;display:none}
.btn{width:100%;border:none;border-radius:10px;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:3px;padding:14px;cursor:pointer}
.btn-orange{background:linear-gradient(135deg,#b45309 0%,#f59e0b 100%);color:#000;font-size:15px}
.btn-scan{background:linear-gradient(135deg,#b45309 0%,#f59e0b 100%);color:#000;font-size:18px;border-radius:12px;margin-bottom:12px;box-shadow:0 0 30px #f59e0b33}

function isParallelOrInsert(title){
var t=title.toLowerCase();
for(var i=0;i<PARALLEL_KEYWORDS.length;i++){
if(t.indexOf(PARALLEL_KEYWORDS[i])>=0)return true;
}
return false;
}

function detectGradeFromTitle(title){
var t=title.toUpperCase();
if(/BGS\s*9\.5/.test(t))return'bgs95';
if(/PSA\s*10/.test(t)&&!/PSA\s*9[^0]/.test(t))return'psa10';
if(/PSA\s*9(?!\.5|\s*10)/.test(t))return'psa9';
if(/SGC\s*10/.test(t))return'psa10';
if(/SGC\s*9\.5/.test(t))return'bgs95';
return null;
}

function getFallbackValue(title,tabGradeId){
if(isParallelOrInsert(title))return null;
var t=title.toLowerCase();
var actualGrade=detectGradeFromTitle(title)||tabGradeId;
var values=FALLBACK_DB[actualGrade]||FALLBACK_DB[tabGradeId]||FALLBACK_DB['psa10'];
var best=null,bestScore=0;
for(var i=0;i<values.length;i++){
var c=values[i];
if(t.indexOf(c.p)<0)continue;
var score=1;
if(c.s&&c.s.length>0){if(t.indexOf(c.s)<0)continue;score+=c.s.split(' ').length;}
if(score>bestScore){bestScore=score;best=c;}
}
if(!best)return null;
return{low:best.low,high:best.high,mid:(best.low+best.high)/2,grade:actualGrade,source:'est'};
}

function updateTabs(){

b.style.borderColor=active?tg.color:'#1e293b';
b.style.color=active?tg.color:'#475569';

});
var total=Object.values(scanData).reduce(function(s,d){return s+(d.auctionDeals?d.auctionDeals.length:0)+(d.buynowDeals?d.buynowDeals.length:0);},0);
document.getElementById('dealCount').textContent=total;
document.getElementById('dealBadge').style.display=total>0?'block':'none';
}

function getCurrentBid(item){
var p=item.currentBidPrice||item.price;
if(!p||!p.value)return null;
var v=parseFloat(p.value);
return v>0?v:null;
}

function formatPrice(val){
if(!val&&val!==0)return'—';
return'$'+parseFloat(val).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function formatEndTime(item){
if(!item.itemEndDate)return null;
var ms=new Date(item.itemEndDate)-Date.now();
if(ms<0)return'ended';
var mins=Math.round(ms/60000);
if(mins<1)return'<1m';
if(mins<60)return mins+'m';
var h=Math.floor(mins/60),m=mins%60;
return h+'h'+(m>0?' '+m+'m':'');
}

function rateCard(item,tabGradeId){
var isAuction=(item.buyingOptions||[]).indexOf('AUCTION')>=0;
var bid=getCurrentBid(item);
// Skip zero bid auctions
if(isAuction&&(!bid||bid<=0))return null;
if(!bid)return null;
var mv=null;
if(item.soldComps&&item.soldComps.mid&&item.soldComps.count>=2){
var actualGrade=detectGradeFromTitle(item.title||'')||tabGradeId;
mv={low:item.soldComps.low,high:item.soldComps.high,mid:item.soldComps.mid,grade:actualGrade,source:'live · '+item.soldComps.count+' sales'};
}else{
mv=getFallbackValue(item.title||'',tabGradeId);
}
if(!mv)return null;
var pct=Math.round(((bid-mv.mid)/mv.mid)*100);
if(pct>-20)return null;
var isFire=pct<=-40;
var gradeLabel={'psa10':'PSA 10','psa9':'PSA 9','bgs95':'BGS 9.5','auto95':'AUTO'}[mv.grade]||mv.grade;
var text='';
if(pct<=-40)text='🚨 '+Math.abs(pct)+'% below '+gradeLabel+' market. Bid immediately.';
else if(pct<=-30)text='🔥 '+Math.abs(pct)+'% below '+gradeLabel+' market. Strong flip.';
else text=Math.abs(pct)+'% below '+gradeLabel+' market. Worth bidding.';
return{isFire:isFire,mv:mv,pct:pct,text:text,gradeLabel:gradeLabel,isAuction:isAuction};
}

function renderCard(entry){
var item=entry.item;
var rating=entry.rating;
var currentBid=getCurrentBid(item);
var timeLeft=formatEndTime(item);
var img=item.image?item.image.imageUrl:'';
var isAuction=rating.isAuction;
var urgentMins=isAuction&&timeLeft&&timeLeft.indexOf('m')===timeLeft.length-1&&parseInt(timeLeft)<=30;
var pctStr=rating.pct+'%';
var pctClass=rating.isFire?'fire-color':'green';
var cardClass=rating.isFire?'is-fire':'is-deal';
var tagLabel=rating.isFire?'🚨 MASSIVE DEAL':'🔥 DEAL';
var tagClass=rating.isFire?'fire':'deal';
return'<div class="listing-card '+cardClass+'">'
+'<div class="card-top">'
+(img?'<img class="listing-img" src="'+img+'" alt=""/>':'')
+'<div class="card-info">'
+'<div class="tags">'
+'<span class="tag '+tagClass+'">'+tagLabel+'</span>'
+'<span class="tag '+(isAuction?'auction-tag':'buynow-tag')+'">'+(isAuction?'AUCTION':'BUY NOW')+'</span>'
+(isAuction&&timeLeft?'<span class="tag ending'+(urgentMins?' urgent':'')+'">⏱ '+timeLeft+'</span>':'')
+'</div>'
+'<div class="card-title">'+(item.title||'')+'</div>'
+'</div></div>'
+'<div class="metrics-row">'
+'<div class="metric"><div class="metric-label">'+(isAuction?'CURRENT BID':'PRICE')+'</div><div class="metric-value '+(isAuction?'gold':'teal')+'">'+(currentBid?formatPrice(currentBid):'—')+'</div></div>'
+'<div class="metric"><div class="metric-label">MARKET VALUE</div><div class="metric-value" style="font-size:10px;line-height:1.4">'+formatPrice(rating.mv.low)+' – '+formatPrice(rating.mv.high)+'</div><div class="comp-label">'+rating.mv.source+'</div></div>'
+'<div class="metric"><div class="metric-label">BELOW MARKET</div><div class="metric-value '+pctClass+'" style="font-size:15px">'+pctStr+'</div></div>'
+'</div>'
+'<div class="ai-text">'+rating.text+'</div>'
+'<a class="bid-btn'+(rating.isFire?' fire':isAuction?(urgentMins?' urgent':''):' buynow')+'" href="'+(item.itemWebUrl||'#')+'" target="_blank">'+(rating.isFire?'🚨 BID NOW — MASSIVE DEAL':isAuction?(urgentMins?'⚡ BID NOW — ENDING SOON':'BID ON EBAY →'):'BUY IT NOW →')+'</a>'
+'</div>';
}

function renderListings(){
var area=document.getElementById('listingsArea');
var d=scanData[activeGrade]||{};
var tg=GRADES.find(function(t){return t.id===activeGrade;});
if(!d.auctionDeals&&!d.buynowDeals&&!d.loading){
area.innerHTML='<div class="empty">Hit RUN FULL SCAN<br/><span>Any player · $50–$500 · 20%+ below market</span></div>';return;
}
if(d.loading){
area.innerHTML='<div class="loading"><span class="spin">⟳</span><br/>'+(d.status||'Scanning...')+'</div>';return;
}
if(d.error){area.innerHTML='<div class="err">'+d.error+'</div>';return;}

var deals=activeView==='auction'?(d.auctionDeals||[]):(d.buynowDeals||[]);
if(!deals.length){
var other=activeView==='auction'?(d.buynowDeals||[]):(d.auctionDeals||[]);
var otherLabel=activeView==='auction'?'Buy It Now':'Auctions';
var hint=other.length>0?' Try the '+otherLabel+' tab — '+other.length+' deal'+(other.length>1?'s':'')+' there.':'';
area.innerHTML='<div class="no-deals">No 20%+ deals in this view for '+tg.label+'<br/><span style="color:#475569">Check back in 15 min.'+hint+'</span></div>';
return;
}
area.innerHTML=deals.map(renderCard).join('');
}

function fetchWithRetry(url,retries,delay){
retries=retries||3;delay=delay||4000;
return new Promise(function(resolve,reject){
function attempt(n){
var controller=new AbortController();
var t=setTimeout(function(){controller.abort();},60000);
fetch(url,{signal:controller.signal})
.then(function(r){clearTimeout(t);return r.json();})
.then(resolve)
.catch(function(e){clearTimeout(t);if(n<=1)reject(e);else setTimeout(function(){attempt(n-1);},delay);});
}
attempt(retries);
});
}

function runFullScan(){
if(!clientId||!clientSecret||scanning)return;
scanning=true;
var btn=document.getElementById('scanBtn');
btn.disabled=true;btn.textContent='⟳ SCANNING...';
document.getElementById('lastScan').textContent='Last: '+new Date().toLocaleTimeString();
var gi=0;
function nextGrade(){
if(gi>=GRADES.length){scanning=false;btn.disabled=false;btn.textContent='⚡ RUN FULL SCAN';return;}
var tg=GRADES[gi];gi++;
scanData[tg.id]={loading:true,auctionDeals:[],buynowDeals:[],error:null,status:'Scanning '+tg.label+' $50–$500...'};
updateTabs();if(activeGrade===tg.id)renderListings();
var url=PROXY+'/scan?clientId='+encodeURIComponent(clientId)+'&clientSecret='+encodeURIComponent(clientSecret)+'&grade='+encodeURIComponent(tg.grade);
fetchWithRetry(url,2,4000).then(function(data){
var items=data.itemSummaries||[];
var auctionDeals=[],buynowDeals=[];
items.forEach(function(item){
var rating=rateCard(item,tg.id);
if(!rating)return;
if(rating.isAuction)auctionDeals.push({item:item,rating:rating});
else buynowDeals.push({item:item,rating:rating});
});
scanData[tg.id]={loading:false,auctionDeals:auctionDeals,buynowDeals:buynowDeals,error:null};
updateTabs();if(activeGrade===tg.id)renderListings();
nextGrade();
}).catch(function(e){
scanData[tg.id]={loading:false,auctionDeals:[],buynowDeals:[],error:'Scan failed — wake server first at card-scanner-proxy.onrender.com/token'};
updateTabs();if(activeGrade===tg.id)renderListings();
nextGrade();
});
}
nextGrade();
}

window.onload=init;
</script>
