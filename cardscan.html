function isParallelOrInsert(title) {
var t = title.toLowerCase();
// Strip known base identifiers first
var baseTerms = ['rated rookie','rookie ticket','prizm #','#269','#327','#236',
'#200','#166','#144','bowman chrome','bowman #','topps chrome','topps #',
'sp authentic','upper deck','fleer','score #','nba hoops #','hoops #'];
// Check for parallel/insert keywords
for (var i = 0; i < PARALLEL_KEYWORDS.length; i++) {
if (t.indexOf(PARALLEL_KEYWORDS[i]) >= 0) {
// Check if it's a known base with this word in the set name
// e.g. "Donruss Optic Rated Rookie" is base, "Donruss Optic Green" is parallel
var isBase = false;
for (var j = 0; j < baseTerms.length; j++) {
if (t.indexOf(baseTerms[j]) >= 0) { isBase = true; break; }
}
if (!isBase) return true;
}
}
return false;
}

function detectGradeFromTitle(title) {
var t = title.toUpperCase();
if (/BGS\s*9\.5/.test(t)) return 'bgs95';
if (/PSA\s*10/.test(t) && !/PSA\s*9[^0]/.test(t)) return 'psa10';
if (/PSA\s*9(?!\.5|\s*10)/.test(t)) return 'psa9';
if (/SGC\s*10/.test(t)) return 'psa10';
if (/SGC\s*9\.5/.test(t)) return 'bgs95';
return null;
}

function getMarketValue(title, tabGradeId) {
var t = title.toLowerCase();

// Skip parallels and inserts
if (isParallelOrInsert(title)) return null;

var actualGrade = detectGradeFromTitle(title) || tabGradeId;
var values = DB[actualGrade] || DB[tabGradeId] || DB['psa10'];

var best = null, bestScore = 0;
for (var i = 0; i < values.length; i++) {
var c = values[i];
if (t.indexOf(c.p) < 0) continue;
var score = 1;
if (c.s && c.s.length > 0) {
if (t.indexOf(c.s) < 0) continue;
score += c.s.split(' ').length;
}
if (score > bestScore) { bestScore = score; best = c; }
}
if (!best) return null;
return { low: best.low, high: best.high, mid: (best.low + best.high) / 2, grade: actualGrade };
}

}

function loadTrending(){
fetch(PROXY+'/trending?clientId='+encodeURIComponent(clientId)+'&clientSecret='+encodeURIComponent(clientSecret))
.then(function(r){return r.json();})
.then(function(d){
if(d.players){
var final=ANCHORS.slice();
d.players.forEach(function(p){
var pl=p.toLowerCase();
if(pl.indexOf('lebron')<0&&pl.indexOf('curry')<0&&ANCHORS.indexOf(p)<0)final.push(p);
});
trendingPlayers=final;
renderTrending(final);
}
})
.catch(function(){trendingPlayers=ANCHORS;renderTrending(ANCHORS);});
}

function renderTrending(players){
var bar=document.getElementById('trendingBar');
bar.innerHTML=players.map(function(p){
var isAnchor=ANCHORS.indexOf(p)>=0;
return '<span class="trend-pill'+(isAnchor?' anchor':'')+'">'+(isAnchor?'⭐ ':'')+p+'</span>';
}).join('');
}

function buildTabs(){
var t=document.getElementById('gradeTabs');t.innerHTML='';
GRADES.forEach(function(tg){
var b=document.createElement('button');
b.className='grade-tab';b.id='tab-'+tg.id;
b.onclick=function(){activeGrade=tg.id;updateTabs();renderListings();};
t.appendChild(b);
});
updateTabs();
}

function updateTabs(){
GRADES.forEach(function(tg){
var b=document.getElementById('tab-'+tg.id);if(!b)return;
var d=scanData[tg.id]||{};
var deals=d.deals?d.deals.length:0;
var active=activeGrade===tg.id;
b.style.background=active?tg.color+'22':'#070d1a';
b.style.borderColor=active?tg.color:'#1e293b';
b.style.color=active?tg.color:'#475569';
b.innerHTML=tg.label+(deals>0?'<span style="margin-left:6px;background:#f59e0b;color:#000;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:900">'+deals+'</span>':'')+(d.loading?'<span class="spin" style="margin-left:6px">⟳</span>':'');
});
var total=Object.values(scanData).reduce(function(s,d){return s+(d.deals?d.deals.length:0);},0);
document.getElementById('dealCount').textContent=total;
document.getElementById('dealBadge').style.display=total>0?'block':'none';
}

function getCurrentBid(item){
var p=item.currentBidPrice||item.price;
if(!p||!p.value)return null;
var v=parseFloat(p.value);
return v>0?v:null;
}

function formatPrice(val){
if(!val&&val!==0)return'—';
return'$'+parseFloat(val).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function formatEndTime(item){
if(!item.itemEndDate)return null;
var ms=new Date(item.itemEndDate)-Date.now();
if(ms<0)return'ended';
var mins=Math.round(ms/60000);
if(mins<1)return'<1m';
if(mins<60)return mins+'m';
var h=Math.floor(mins/60),m=mins%60;
return h+'h'+(m>0?' '+m+'m':'');
}

function rateCard(item,tabGradeId){
var mv=getMarketValue(item.title||'',tabGradeId);
var bid=getCurrentBid(item);
if(!mv)return null;
if(!bid)return null;
var pct=Math.round(((bid-mv.mid)/mv.mid)*100);
if(pct>-20)return null;
var isFire=pct<=-40;
var gradeLabel={'psa10':'PSA 10','psa9':'PSA 9','bgs95':'BGS 9.5','auto95':'AUTO'}[mv.grade]||mv.grade;
var text='';
if(pct<=-40)text='🚨 '+Math.abs(pct)+'% below '+gradeLabel+' market. Bid immediately.';
else if(pct<=-30)text='🔥 '+Math.abs(pct)+'% below '+gradeLabel+' market. Strong flip.';
else text=Math.abs(pct)+'% below '+gradeLabel+' market. Worth bidding.';
return{tag:'DEAL',isFire:isFire,mv:mv,pct:pct,text:text,gradeLabel:gradeLabel};
}

function renderListings(){
var area=document.getElementById('listingsArea');
var d=scanData[activeGrade]||{};
var tg=GRADES.find(function(t){return t.id===activeGrade;});
if(!d.deals&&!d.loading){area.innerHTML='<div class="empty">Hit RUN FULL SCAN<br/><span>20%+ undervalue · base cards only · 2hr window</span></div>';return;}
if(d.loading){area.innerHTML='<div class="loading"><span class="spin">⟳</span><br/>'+(d.status||'Scanning...')+'</div>';return;}
if(d.error){area.innerHTML='<div class="err">'+d.error+'</div>';return;}
if(!d.deals||!d.deals.length){
area.innerHTML='<div class="no-deals">No 20%+ deals right now for '+tg.label+'<br/><span style="color:#475569">Check back in 15-20 min.</span></div>';
return;
}
area.innerHTML=d.deals.map(function(entry){
var item=entry.item;
var rating=entry.rating;
var currentBid=getCurrentBid(item);
var timeLeft=formatEndTime(item);
var img=item.image?item.image.imageUrl:'';
var urgentMins=timeLeft&&timeLeft.indexOf('m')===timeLeft.length-1&&parseInt(timeLeft)<=30;
var pctStr=rating.pct+'%';
var pctClass=rating.isFire?'fire-color':'green';
var cardClass=rating.isFire?'is-fire':'is-deal';
var tagLabel=rating.isFire?'🚨 MASSIVE DEAL':'🔥 DEAL';
var tagClass=rating.isFire?'fire':'deal';
return '<div class="listing-card '+cardClass+'">'
+'<div class="card-top">'
+(img?'<img class="listing-img" src="'+img+'" alt=""/>':'')
+'<div class="card-info">'
+'<div class="tags">'
+'<span class="tag '+tagClass+'">'+tagLabel+'</span>'
+'<span class="tag auction-tag">AUCTION</span>'
+(timeLeft?'<span class="tag ending'+(urgentMins?' urgent':'')+'">⏱ '+timeLeft+'</span>':'')
+'</div>'
+'<div class="card-title">'+(item.title||'')+'</div>'
+'</div></div>'
+'<div class="metrics-row">'
+'<div class="metric"><div class="metric-label">CURRENT BID</div><div class="metric-value gold">'+(currentBid?formatPrice(currentBid):'—')+'</div></div>'
+'<div class="metric"><div class="metric-label">MARKET VALUE</div><div class="metric-value" style="font-size:10px;line-height:1.4">'+formatPrice(rating.mv.low)+' – '+formatPrice(rating.mv.high)+'</div><div class="comp-label">'+rating.gradeLabel+' base</div></div>'
+'<div class="metric"><div class="metric-label">BELOW MARKET</div><div class="metric-value '+pctClass+'" style="font-size:15px">'+pctStr+'</div></div>'
+'</div>'
+'<div class="ai-text">'+rating.text+'</div>'
+'<a class="bid-btn'+(rating.isFire?' fire':urgentMins?' urgent':'')+'" href="'+(item.itemWebUrl||'#')+'" target="_blank">'+(rating.isFire?'🚨 BID NOW — MASSIVE DEAL':urgentMins?'⚡ BID NOW — ENDING SOON':'BID ON EBAY →')+'</a>'
+'</div>';
}).join('');
}

function fetchWithRetry(url,retries,delay){
retries=retries||3;delay=delay||4000;
return new Promise(function(resolve,reject){
function attempt(n){
var controller=new AbortController();
var t=setTimeout(function(){controller.abort();},55000);
fetch(url,{signal:controller.signal})
.then(function(r){clearTimeout(t);return r.json();})
.then(resolve)
.catch(function(e){clearTimeout(t);if(n<=1)reject(e);else setTimeout(function(){attempt(n-1);},delay);});
}
attempt(retries);
});
}

function runFullScan(){
if(!clientId||!clientSecret||scanning)return;
scanning=true;
var btn=document.getElementById('scanBtn');
btn.disabled=true;btn.textContent='⟳ SCANNING...';
document.getElementById('lastScan').textContent='Last: '+new Date().toLocaleTimeString();
var players=trendingPlayers.length>0?trendingPlayers:ANCHORS;
var gi=0;
function nextGrade(){
if(gi>=GRADES.length){scanning=false;btn.disabled=false;btn.textContent='⚡ RUN FULL SCAN';return;}
var tg=GRADES[gi];gi++;
scanData[tg.id]={loading:true,deals:[],error:null,status:'Scanning '+tg.label+'...'};
updateTabs();if(activeGrade===tg.id)renderListings();
var all=[],done=0;
players.forEach(function(player){
var q,gradeParam;
if(tg.id==='auto95'){
q=player+' rookie auto PSA 9.5 OR PSA 10 OR BGS 9.5 -reprint -lot -custom';
gradeParam='AUTO';
}else{
q=player+' rookie -reprint -lot -custom';
gradeParam=tg.grade;
}
var url=PROXY+'/scan?clientId='+encodeURIComponent(clientId)+'&clientSecret='+encodeURIComponent(clientSecret)+'&q='+encodeURIComponent(q)+'&grade='+encodeURIComponent(gradeParam);
fetchWithRetry(url,2,3000).then(function(data){
(data.itemSummaries||[]).forEach(function(it){all.push(it);});
}).catch(function(){}).finally(function(){
done++;
if(done<players.length)return;
var seen={};
var unique=all.filter(function(it){if(seen[it.itemId])return false;seen[it.itemId]=true;return true;});
unique.sort(function(a,b){
var ta=a.itemEndDate?new Date(a.itemEndDate).getTime():9999999999999;
var tb=b.itemEndDate?new Date(b.itemEndDate).getTime():9999999999999;
return ta-tb;
});
var deals=[];
unique.forEach(function(item){
var rating=rateCard(item,tg.id);
if(rating)deals.push({item:item,rating:rating});
});
scanData[tg.id]={loading:false,deals:deals,error:null};
updateTabs();if(activeGrade===tg.id)renderListings();
nextGrade();
});
});
}
nextGrade();
}

window.onload=init;
</script>
