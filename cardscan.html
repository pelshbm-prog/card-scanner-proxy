<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CardScan</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04080f;color:#e2e8f0;font-family:'Share Tech Mono',monospace;min-height:100vh}
.header{border-bottom:1px solid #0f172a;background:linear-gradient(180deg,#070d1a 0%,#04080f 100%);padding:16px}
.logo{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:#e2e8f0;letter-spacing:4px}
.logo span{color:#f59e0b}
.subtitle{font-size:10px;color:#334155;letter-spacing:3px;margin-top:2px}
.content{max-width:700px;margin:0 auto;padding:16px 14px 80px}
.auth-panel{background:linear-gradient(135deg,#070d1a,#0a1020);border:1px solid #1e293b;border-radius:14px;padding:24px}
.auth-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#f59e0b;margin-bottom:6px;letter-spacing:2px}
.auth-sub{font-size:12px;color:#475569;margin-bottom:20px;line-height:1.6}
.field{margin-bottom:12px}
.field-label{font-size:10px;color:#475569;letter-spacing:2px;margin-bottom:6px}
input{background:#070d1a;border:1px solid #1e293b;border-radius:8px;color:#e2e8f0;font-family:'Share Tech Mono',monospace;font-size:13px;padding:11px 14px;width:100%;outline:none}
.error-box{background:#1c0a0a;border:1px solid #f8717133;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#f87171;display:none}
.btn-connect{width:100%;border:none;border-radius:10px;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:3px;padding:14px;cursor:pointer;background:linear-gradient(135deg,#b45309,#f59e0b);color:#000;font-size:15px}
.btn-scan{width:100%;border:none;background:linear-gradient(135deg,#b45309,#f59e0b);color:#000;font-size:17px;border-radius:12px;padding:14px;font-family:'Orbitron',monospace;font-weight:900;letter-spacing:3px;cursor:pointer;margin-bottom:12px;box-shadow:0 0 30px #f59e0b33}
.btn-scan:disabled{background:#1e293b;color:#475569;cursor:not-allowed;box-shadow:none}
.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ctrl-label{font-size:9px;color:#334155;letter-spacing:2px;margin-bottom:5px}
.ctrl-group{flex:1;min-width:140px}
.pill-row{display:flex;gap:5px;flex-wrap:wrap}
.pill{background:#070d1a;border:1px solid #1e293b;border-radius:20px;color:#475569;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;padding:5px 11px;cursor:pointer;white-space:nowrap}
.pill.active{border-color:#f59e0b;color:#f59e0b;background:#f59e0b11}
.pill.active-blue{border-color:#38bdf8;color:#38bdf8;background:#38bdf811}
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.results-count{font-size:11px;color:#475569}
.deal-badge{background:#f59e0b22;border:1px solid #f59e0b44;border-radius:6px;padding:4px 10px;font-family:'Orbitron',monospace;font-size:12px;color:#f59e0b;font-weight:700}
.card{background:linear-gradient(135deg,#0a0f1e,#0f172a);border:1px solid #1e293b;border-radius:12px;padding:14px;margin-bottom:10px}
.card-top{display:flex;gap:12px;margin-bottom:10px}
.card-img{width:58px;height:80px;object-fit:contain;border-radius:6px;background:#1e293b;flex-shrink:0}
.card-right{flex:1;min-width:0}
.card-tags{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.tag{border-radius:4px;padding:2px 7px;font-size:9px;letter-spacing:1px;font-weight:700}
.tag-time{background:#1e293b;color:#94a3b8}
.tag-time.soon{background:#ef444422;color:#ef4444;border:1px solid #ef444444}
.tag-time.urgent{background:#ef4444;color:#fff;animation:pulse 1s infinite}
.tag-grade{background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa44}
.card-title{font-size:12px;color:#cbd5e1;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.bid-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.bid-amount{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#f59e0b}
.bid-label{font-size:9px;color:#475569;letter-spacing:1px}
.bids-count{font-size:11px;color:#64748b}
.comp-section{background:#070d1a;border:1px solid #1e293b;border-radius:8px;padding:10px;margin-bottom:10px}
.comp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.comp-title{font-size:10px;color:#475569;letter-spacing:1px}
.comp-status{font-size:10px;color:#64748b}
.comp-prices{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.comp-price{background:#0f172a;border:1px solid #1e293b;border-radius:6px;padding:5px 8px;text-align:center}
.comp-price-val{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#e2e8f0}
.comp-price-date{font-size:8px;color:#334155;margin-top:2px}
.comp-avg{font-size:10px;color:#64748b;margin-top:4px}
.comp-avg span{color:#4ade80;font-weight:700}
.comp-avg.over span{color:#f87171}
.btn-comps{width:100%;border:none;background:#1e293b;border-radius:8px;padding:9px;font-family:'Share Tech Mono',monospace;font-size:11px;color:#64748b;cursor:pointer;letter-spacing:1px;margin-bottom:8px}
.btn-comps:hover{background:#334155;color:#e2e8f0}
.btn-comps.loading{color:#f59e0b;animation:pulse 1s infinite}
.btn-bid{display:block;width:100%;background:linear-gradient(135deg,#b45309,#f59e0b);color:#000;border:none;border-radius:8px;padding:10px;font-size:13px;font-family:'Orbitron',monospace;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;letter-spacing:2px}
.btn-bid.urgent{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;animation:pulse 0.8s infinite}
.empty{text-align:center;padding:50px 20px;color:#1e293b;font-size:13px;line-height:2}
.empty span{color:#334155}
.loading-msg{text-align:center;padding:30px;color:#334155;font-size:12px;line-height:2.2}
.err-msg{padding:14px;background:#1c0a0a;border:1px solid #f8717133;border-radius:8px;font-size:12px;color:#f87171}
.logout{background:#1e293b;color:#64748b;border:1px solid #334155;border-radius:6px;padding:4px 10px;font-size:10px;font-family:'Share Tech Mono',monospace;cursor:pointer}
.divider{height:1px;background:#0f172a;margin:4px 0 10px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.spin{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>
<body>
<div class="header">
<div style="max-width:700px;margin:0 auto;display:flex;justify-content:space-between;align-items:center">
<div>
<div class="logo">CARD<span>SCAN</span></div>
<div class="subtitle">AUCTION SNIPER · REAL COMPS</div>
</div>
<div style="display:flex;gap:10px;align-items:center">
<div id="lastScan" style="font-size:10px;color:#334155"></div>
<button class="logout" id="logoutBtn" style="display:none" onclick="logout()">DISCONNECT</button>
</div>
</div>
</div>

<div class="content">
<div id="authPanel" class="auth-panel">
<div class="auth-title">CONNECT EBAY</div>
<div class="auth-sub">Enter your Production API keys from developer.ebay.com</div>
<div class="field"><div class="field-label">CLIENT ID</div><input type="text" id="clientId" placeholder="BrianPel-Cardtrac-PRD-..."/></div>
<div class="field" style="margin-bottom:18px"><div class="field-label">CLIENT SECRET</div><input type="password" id="clientSecret" placeholder="PRD-..."/></div>
<div id="authError" class="error-box"></div>
<button class="btn-connect" onclick="handleAuth()">CONNECT</button>
</div>

<div id="scanPanel" style="display:none">
<button class="btn-scan" id="scanBtn" onclick="runScan()">⚡ SCAN AUCTIONS</button>

<div class="controls">
<div class="ctrl-group">
<div class="ctrl-label">ENDING WITHIN</div>
<div class="pill-row">
<button class="pill" onclick="setWindow(0.5,this)">30m</button>
<button class="pill active" onclick="setWindow(2,this)">2h</button>
<button class="pill" onclick="setWindow(6,this)">6h</button>
<button class="pill" onclick="setWindow(12,this)">12h</button>
<button class="pill" onclick="setWindow(24,this)">24h</button>
</div>
</div>
<div class="ctrl-group">
<div class="ctrl-label">GRADE</div>
<div class="pill-row" id="gradePills">
<button class="pill active" onclick="setGrade('PSA 10',this)">PSA 10</button>
<button class="pill" onclick="setGrade('PSA 9',this)">PSA 9</button>
<button class="pill" onclick="setGrade('BGS 9.5',this)">BGS 9.5</button>
<button class="pill" onclick="setGrade('ALL',this)">ALL</button>
</div>
</div>
</div>

<div class="divider"></div>
<div class="results-header">
<div class="results-count" id="resultsCount">No results yet</div>
<div id="dealBadge" style="display:none" class="deal-badge">🔥 <span id="dealCount">0</span> DEALS</div>
</div>
<div id="results"><div class="empty">Hit SCAN AUCTIONS<br/><span>Finds graded rookie auctions ending soon<br/>Check comps on any card instantly</span></div></div>
</div>
</div>

<script>
var PROXY='https://card-scanner-proxy.onrender.com';
var clientId='',clientSecret='',activeWindow=2,activeGrade='PSA 10',scanning=false,compCache={};

function init(){
var sid=localStorage.getItem('cs_id');
var ssec=localStorage.getItem('cs_sec');
if(sid&&ssec){clientId=sid;clientSecret=ssec;showScan();}
}

function handleAuth(){
var id=document.getElementById('clientId').value.trim();
var sec=document.getElementById('clientSecret').value.trim();
if(!id||!sec){showErr('Enter both fields');return;}
clientId=id;clientSecret=sec;
localStorage.setItem('cs_id',id);
localStorage.setItem('cs_sec',sec);
showScan();
}

function showErr(msg){
var e=document.getElementById('authError');
e.textContent=msg;e.style.display='block';
}

function showScan(){
document.getElementById('authPanel').style.display='none';
document.getElementById('scanPanel').style.display='block';
document.getElementById('logoutBtn').style.display='block';
}

function logout(){
localStorage.removeItem('cs_id');localStorage.removeItem('cs_sec');
clientId='';clientSecret='';
document.getElementById('authPanel').style.display='block';
document.getElementById('scanPanel').style.display='none';
document.getElementById('logoutBtn').style.display='none';
}

function setWindow(h,btn){
activeWindow=h;
document.querySelectorAll('.ctrl-group:first-child .pill').forEach(function(p){p.className='pill';});
btn.className='pill active';
}

function setGrade(g,btn){
activeGrade=g;
document.querySelectorAll('#gradePills .pill').forEach(function(p){p.className='pill';});
btn.className='pill active';
}

function formatTime(item){
if(!item.itemEndDate)return null;
var ms=new Date(item.itemEndDate)-Date.now();
if(ms<0)return'ended';
var mins=Math.round(ms/60000);
if(mins<1)return'<1m';
if(mins<60)return mins+'m';
var h=Math.floor(mins/60),m=mins%60;
return h+'h'+(m>0?' '+m+'m':'');
}

function getPrice(item){
var p=item.currentBidPrice||item.price;
return p?parseFloat(p.value):0;
}

function fmt(v){
return'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function gradeTag(title){
var t=title.toUpperCase();
if(/BGS\s*9\.5/.test(t))return'BGS 9.5';
if(/PSA\s*10/.test(t))return'PSA 10';
if(/PSA\s*9(?!\.5|\s*10)/.test(t))return'PSA 9';
if(/SGC\s*10/.test(t))return'SGC 10';
if(/SGC\s*9\.5/.test(t))return'SGC 9.5';
return'GRADED';
}

function renderCard(item,idx){
var price=getPrice(item);
var timeLeft=formatTime(item);
var img=item.image?item.image.imageUrl:'';
var urgentMins=timeLeft&&/^\d+m$/.test(timeLeft)&&parseInt(timeLeft)<=30;
var soon=timeLeft&&(/^\d+m$/.test(timeLeft)||(/^1h/.test(timeLeft)));
var grade=gradeTag(item.title||'');
var bidCount=item.bidCount||0;

return'<div class="card" id="card-'+idx+'">'
+'<div class="card-top">'
+(img?'<img class="card-img" src="'+img+'" alt=""/>':'<div class="card-img"></div>')
+'<div class="card-right">'
+'<div class="card-tags">'
+'<span class="tag tag-grade">'+grade+'</span>'
+(timeLeft?'<span class="tag tag-time'+(urgentMins?' urgent':soon?' soon':'')+'">⏱ '+timeLeft+'</span>':'')
+'</div>'
+'<div class="card-title">'+(item.title||'')+'</div>'
+'</div></div>'
+'<div class="bid-row">'
+'<div><div class="bid-label">CURRENT BID</div><div class="bid-amount">'+fmt(price)+'</div></div>'
+(bidCount?'<div class="bids-count">'+bidCount+' bid'+(bidCount!==1?'s':'')+'</div>':'')
+'</div>'
+'<div class="comp-section" id="comps-'+idx+'">'
+'<div class="comp-header"><div class="comp-title">SOLD COMPS</div><div class="comp-status" id="comp-status-'+idx+'">not loaded</div></div>'
+'<div id="comp-data-'+idx+'"></div>'
+'</div>'
+'<button class="btn-comps" id="comp-btn-'+idx+'" onclick="loadComps('+idx+','+JSON.stringify(item.title).replace(/'/g,"\\'")+','+JSON.stringify(grade)+')">📊 CHECK LAST 5 SOLD COMPS</button>'
+'<a class="btn-bid'+(urgentMins?' urgent':'')+'" href="'+(item.itemWebUrl||'#')+'" target="_blank">'+(urgentMins?'⚡ BID NOW — ENDING SOON':'BID ON EBAY →')+'</a>'
+'</div>';
}

async function loadComps(idx,title,grade){
var btn=document.getElementById('comp-btn-'+idx);
var status=document.getElementById('comp-status-'+idx);
var dataDiv=document.getElementById('comp-data-'+idx);
if(!btn||!status||!dataDiv)return;

var cacheKey=title+'|'+grade;
if(compCache[cacheKey]){
renderComps(idx,compCache[cacheKey],title);
return;
}

btn.className='btn-comps loading';
btn.textContent='⟳ Loading sold comps...';
status.textContent='searching...';

try{
var url=PROXY+'/comps?clientId='+encodeURIComponent(clientId)+'&clientSecret='+encodeURIComponent(clientSecret)+'&title='+encodeURIComponent(title)+'&grade='+encodeURIComponent(grade);
var r=await fetch(url,{signal:AbortSignal.timeout(20000)});
var data=await r.json();
if(data.prices&&data.prices.length>0){
compCache[cacheKey]=data;
renderComps(idx,data,title);
}else{
status.textContent='no comps found';
btn.className='btn-comps';
btn.textContent='📊 RETRY COMPS';
}
}catch(e){
status.textContent='failed';
btn.className='btn-comps';
btn.textContent='📊 RETRY COMPS';
}
}

function renderComps(idx,data,title){
var btn=document.getElementById('comp-btn-'+idx);
var status=document.getElementById('comp-status-'+idx);
var dataDiv=document.getElementById('comp-data-'+idx);
var currentBid=0;
var cardEl=document.getElementById('card-'+idx);
if(cardEl){
var bidEl=cardEl.querySelector('.bid-amount');
if(bidEl)currentBid=parseFloat(bidEl.textContent.replace(/[$,]/g,''))||0;
}

status.textContent=data.prices.length+' sales (90 days)';
btn.style.display='none';

var avg=data.avg||0;
var pct=avg>0?Math.round(((currentBid-avg)/avg)*100):0;
var isUnder=pct<=-15;
var isFire=pct<=-30;

var pricesHtml=data.prices.map(function(p){
return'<div class="comp-price">'
+'<div class="comp-price-val">'+fmt(p.price)+'</div>'
+'<div class="comp-price-date">'+p.date+'</div>'
+'</div>';
}).join('');

var pctColor=isUnder?'#4ade80':'#f87171';
var pctText=pct<=0?pct+'% below avg':'+'+pct+'% above avg';

dataDiv.innerHTML='<div class="comp-prices">'+pricesHtml+'</div>'
+'<div class="comp-avg'+(isUnder?'':' over')+'">'
+'Avg: <span>'+fmt(avg)+'</span> · '
+'<span style="color:'+pctColor+'">'+pctText+'</span>'
+(isFire?' 🔥 STRONG BUY':isUnder?' ✅ BELOW MARKET':'')
+'</div>';

// Update deal count
updateDealCount();
}

function updateDealCount(){
var deals=document.querySelectorAll('.comp-avg:not(.over)').length;
document.getElementById('dealCount').textContent=deals;
document.getElementById('dealBadge').style.display=deals>0?'flex':'none';
}

async function runScan(){
if(scanning)return;
scanning=true;
var btn=document.getElementById('scanBtn');
btn.disabled=true;btn.textContent='⟳ SCANNING...';
document.getElementById('lastScan').textContent='';
document.getElementById('results').innerHTML='<div class="loading-msg"><span class="spin">⟳</span><br/>Scanning eBay auctions...<br/><span style="color:#475569;font-size:11px">Finding graded rookies ending within '+activeWindow+'hr</span></div>';
document.getElementById('resultsCount').textContent='Scanning...';
document.getElementById('dealBadge').style.display='none';
compCache={};

try{
var url=PROXY+'/scan?clientId='+encodeURIComponent(clientId)+'&clientSecret='+encodeURIComponent(clientSecret)+'&grade='+encodeURIComponent(activeGrade)+'&window='+activeWindow;
var r=await fetch(url,{signal:AbortSignal.timeout(60000)});
var data=await r.json();
var items=data.itemSummaries||[];

document.getElementById('lastScan').textContent='Last: '+new Date().toLocaleTimeString();
document.getElementById('resultsCount').textContent=items.length+' auctions found — tap CHECK COMPS on any card';

if(!items.length){
document.getElementById('results').innerHTML='<div class="empty">No auctions found<br/><span>Try a wider window or different grade</span></div>';
}else{
document.getElementById('results').innerHTML=items.map(function(item,i){return renderCard(item,i);}).join('');
}
}catch(e){
document.getElementById('results').innerHTML='<div class="err-msg">Scan failed — wake server first at card-scanner-proxy.onrender.com/token</div>';
document.getElementById('resultsCount').textContent='Error';
}

scanning=false;
btn.disabled=false;btn.textContent='⚡ SCAN AUCTIONS';
}

window.onload=init;
</script>
</body>
</html>
